# ── Docker / Conda ──
[docker_context]
symbol = ""
style = "bg:#1d2230"
format = '[[ $symbol $context ](fg:#769ff0 bg:#1d2230)]($style)'

[conda]
symbol = ""
style = "bg:#1d2230"
format = '[[ $symbol $environment ](fg:#769ff0 bg:#1d2230)]($style)'

# ── Command Duration ──
[cmd_duration]
min_time = 2_000
style = "bg:#15161e"
format = '[[  $duration ](fg:#a0a9cb bg:#15161e)]($style)'

# ── Time ──
[time]
disabled = false
time_format = "%R"
style = "bg:#15161e"
format = '[[  $time ](fg:#a0a9cb bg:#15161e)]($style)'

# ── Character ──
[character]
success_symbol = "[❯](bold fg:#769ff0)"
error_symbol = "[❯](bold fg:#f7768e)"

# ── Disabled ──
[gcloud]
disabled = true
