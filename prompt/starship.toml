"$schema" = 'https://starship.rs/config-schema.json'

format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$deno\
$php\
$python\
$java\
$kotlin\
$lua\
$ruby\
$swift\
$dart\
$perl\
$zig\
$scala\
$elixir\
$elm\
$haskell\
$julia\
$nim\
[](fg:#212736 bg:#1d2230)\
$docker_context\
$conda\
[](fg:#1d2230 bg:#15161e)\
$cmd_duration\
$time\
[ ](fg:#15161e)\
\n$character"""

# ── Directory ──
[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 0
fish_style_pwd_dir_length = 0
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# ── Git ──
[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

# ── Languages ──
