patch:
  # -- 候選窗外觀 --
  style/horizontal: false
  style/font_face: "Maple Mono NF CN"
  style/font_point: 18
  style/corner_radius: 10
  style/color_scheme: macos_light
  style/color_scheme_dark: solarized_rock

  # -- 候選詞數量 --
  menu/page_size: 6

  # -- 切換選項 --
  switches:
    - name: ascii_mode
      reset: 0
      states: [ 中文, 西文 ]
    - name: full_shape
      states: [ 半形, 全形 ]
    - name: simplification
      reset: 0
      states: [ 漢字, 汉字 ]

  # -- 模糊音 --
  speller/algebra:
    - derive/ㄓ/ㄗ/
    - derive/ㄗ/ㄓ/
    - derive/ㄔ/ㄘ/
    - derive/ㄘ/ㄔ/
    - derive/ㄕ/ㄙ/
    - derive/ㄙ/ㄕ/
    - derive/ㄢ/ㄤ/
    - derive/ㄤ/ㄢ/
    - derive/ㄣ/ㄥ/
    - derive/ㄥ/ㄣ/
    - derive/ㄦ/ㄜ/
    - derive/ㄜ/ㄦ/
